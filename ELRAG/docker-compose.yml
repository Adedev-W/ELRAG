services:
  scylla:
    image: scylladb/scylla:2026.1.3
    container_name: rust-me-scylla
    command:
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - "1"
    ports:
      - "9042:9042"
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e \"SELECT cluster_name FROM system.local;\" localhost 9042 >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  scylla-data:
